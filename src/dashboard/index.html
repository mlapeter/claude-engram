<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>engram</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --bg-card: #0d1117;
      --bg-card-hover: #111820;
      --cyan: #00e5ff;
      --cyan-dim: rgba(0, 229, 255, 0.3);
      --cyan-glow: rgba(0, 229, 255, 0.15);
      --cyan-subtle: rgba(0, 229, 255, 0.08);
      --teal: #00bfa5;
      --purple: #b388ff;
      --amber: #ffd740;
      --red: #ff5252;
      --text: #c5cdd8;
      --text-dim: #5c6773;
      --border: rgba(0, 229, 255, 0.12);
      --border-glow: rgba(0, 229, 255, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0, 229, 255, 0.08);
    }

    .header .status {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
    }

    .header .status .live {
      color: var(--teal);
      text-shadow: 0 0 8px rgba(0, 191, 165, 0.5);
    }

    /* Grid layout */
    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-top {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-main {
      grid-template-columns: 1fr 1fr;
      margin-top: 20px;
    }

    .grid-bottom {
      grid-template-columns: 2fr 1fr;
      margin-top: 20px;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      border-color: var(--border-glow);
      box-shadow: 0 0 15px var(--cyan-glow), inset 0 0 15px rgba(0, 229, 255, 0.02);
    }

    .card-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* Stat cards */
    .stat-value {
      font-size: 36px;
      font-weight: 300;
      color: var(--cyan);
      text-shadow: 0 0 15px var(--cyan-glow);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .stat-sub span {
      color: var(--text);
    }

    /* Strength bars */
    .strength-bars {
      display: flex;
      gap: 3px;
      height: 32px;
      margin-top: 12px;
      align-items: flex-end;
    }

    .strength-bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      transition: height 0.5s ease;
      position: relative;
      min-height: 2px;
    }

    .strength-bar:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1px solid var(--border-glow);
      padding: 4px 8px;
      font-size: 10px;
      white-space: nowrap;
      border-radius: 2px;
      color: var(--cyan);
      z-index: 10;
    }

    /* Chart containers */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Event feed */
    .event-feed {
      max-height: 400px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--cyan-dim) transparent;
    }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--cyan-subtle);
      font-size: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event-type {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      white-space: nowrap;
      min-width: 72px;
      text-align: center;
    }

    .event-type.extract { background: rgba(0, 229, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.2); }
    .event-type.recall { background: rgba(179, 136, 255, 0.1); color: var(--purple); border: 1px solid rgba(179, 136, 255, 0.2); }
    .event-type.store { background: rgba(0, 191, 165, 0.1); color: var(--teal); border: 1px solid rgba(0, 191, 165, 0.2); }
    .event-type.reinforce { background: rgba(255, 215, 64, 0.1); color: var(--amber); border: 1px solid rgba(255, 215, 64, 0.2); }
    .event-type.forget { background: rgba(255, 82, 82, 0.1); color: var(--red); border: 1px solid rgba(255, 82, 82, 0.2); }
    .event-type.consolidate { background: rgba(0, 229, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.2); }
    .event-type.session { background: rgba(92, 103, 115, 0.2); color: var(--text-dim); border: 1px solid rgba(92, 103, 115, 0.3); }
    .event-type.dedup { background: rgba(255, 215, 64, 0.1); color: var(--amber); border: 1px solid rgba(255, 215, 64, 0.2); }

    .event-time {
      color: var(--text-dim);
      font-size: 10px;
      white-space: nowrap;
    }

    .event-detail {
      flex: 1;
      color: var(--text);
    }

    .event-project {
      color: var(--cyan);
      font-size: 10px;
    }

    /* Tag pills */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 2px;
      background: var(--cyan-subtle);
      color: var(--cyan);
      border: 1px solid var(--border);
    }

    .tag-pill .count {
      color: var(--text-dim);
      margin-left: 4px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .grid-top { grid-template-columns: repeat(2, 1fr); }
      .grid-main, .grid-bottom { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .grid-top { grid-template-columns: 1fr; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>engram</h1>
      <div class="status">
        <div class="live">&#9679; LIVE</div>
        <div id="lastUpdate">loading...</div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid grid-top">
      <div class="card">
        <div class="card-title">Total Memories</div>
        <div class="stat-value" id="totalMemories">-</div>
        <div class="stat-sub">
          <span id="globalCount">-</span> global &middot; <span id="projectCount">-</span> project
        </div>
      </div>
      <div class="card">
        <div class="card-title">Avg Strength</div>
        <div class="stat-value" id="avgStrength">-</div>
        <div class="stat-sub">
          <span id="episodicCount">-</span> episodic &middot; <span id="semanticCount">-</span> semantic
        </div>
      </div>
      <div class="card">
        <div class="card-title">Health Distribution</div>
        <div class="strength-bars" id="healthBars"></div>
        <div class="stat-sub" id="healthSub"></div>
      </div>
      <div class="card">
        <div class="card-title">Salience Profile</div>
        <div class="chart-wrap" style="height: 160px;">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Main charts -->
    <div class="grid grid-main">
      <div class="card">
        <div class="card-title">Memory Constellation</div>
        <div class="chart-wrap">
          <canvas id="constellationChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Strength Distribution</div>
        <div class="chart-wrap">
          <canvas id="strengthChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Bottom section -->
    <div class="grid grid-bottom">
      <div class="card">
        <div class="card-title">Activity Feed</div>
        <div class="event-feed" id="eventFeed">
          <div class="empty-state">
            <div class="icon">&#9671;</div>
            NO EVENTS RECORDED
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Tags</div>
        <div class="tag-list" id="tagList"></div>
      </div>
    </div>
  </div>

  <script>
    // Chart.js global config for Tron aesthetic
    Chart.defaults.color = '#5c6773';
    Chart.defaults.borderColor = 'rgba(0, 229, 255, 0.08)';
    Chart.defaults.font.family = "'JetBrains Mono', monospace";
    Chart.defaults.font.size = 10;

    const CYAN = '#00e5ff';
    const CYAN_DIM = 'rgba(0, 229, 255, 0.3)';
    const CYAN_BG = 'rgba(0, 229, 255, 0.08)';
    const TEAL = '#00bfa5';
    const PURPLE = '#b388ff';
    const AMBER = '#ffd740';
    const RED = '#ff5252';

    let radarChart, constellationChart, strengthChart;

    async function fetchJson(url) {
      try {
        const res = await fetch(url);
        return await res.json();
      } catch {
        return null;
      }
    }

    function timeAgo(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    // --- Health Stats ---
    async function updateHealth() {
      const data = await fetchJson('/api/health');
      if (!data) return;

      document.getElementById('totalMemories').textContent = data.total.toLocaleString();
      document.getElementById('globalCount').textContent = data.global;
      document.getElementById('projectCount').textContent = data.project;
      document.getElementById('avgStrength').textContent = data.avgStrength.toFixed(2);
      document.getElementById('episodicCount').textContent = data.episodic;
      document.getElementById('semanticCount').textContent = data.semantic;

      // Health bars
      const bars = document.getElementById('healthBars');
      const categories = [
        { label: 'Strong', count: data.strong, color: CYAN },
        { label: 'Stable', count: data.stable, color: TEAL },
        { label: 'Fading', count: data.fading, color: AMBER },
        { label: 'Decaying', count: data.decaying, color: RED },
      ];
      const max = Math.max(...categories.map(c => c.count), 1);
      bars.innerHTML = categories.map(c => {
        const h = Math.max(2, (c.count / max) * 32);
        return `<div class="strength-bar" style="height:${h}px;background:${c.color};box-shadow:0 0 6px ${c.color}40" data-tooltip="${c.label}: ${c.count}"></div>`;
      }).join('');
      document.getElementById('healthSub').innerHTML = categories.map(c =>
        `<span style="color:${c.color}">${c.count}</span> ${c.label.toLowerCase()}`
      ).join(' &middot; ');

      document.getElementById('lastUpdate').textContent = 'updated ' + new Date().toLocaleTimeString();
    }

    // --- Radar Chart ---
    async function updateRadar() {
      const data = await fetchJson('/api/salience');
      if (!data) return;

      const ctx = document.getElementById('radarChart').getContext('2d');
      if (radarChart) radarChart.destroy();

      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Novelty', 'Relevance', 'Emotional', 'Predictive'],
          datasets: [{
            data: [data.novelty, data.relevance, data.emotional, data.predictive],
            borderColor: CYAN,
            backgroundColor: CYAN_BG,
            borderWidth: 1.5,
            pointBackgroundColor: CYAN,
            pointBorderColor: CYAN,
            pointRadius: 3,
            pointHoverRadius: 5,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              beginAtZero: true,
              max: 1,
              ticks: { stepSize: 0.25, display: false },
              grid: { color: 'rgba(0, 229, 255, 0.06)' },
              angleLines: { color: 'rgba(0, 229, 255, 0.06)' },
              pointLabels: { color: '#5c6773', font: { size: 9 } },
            },
          },
        },
      });
    }

    // --- Constellation ---
    async function updateConstellation() {
      const data = await fetchJson('/api/constellation');
      if (!data || data.length === 0) return;

      const ctx = document.getElementById('constellationChart').getContext('2d');
      if (constellationChart) constellationChart.destroy();

      const globalPts = data.filter(p => p.scope === 'global');
      const projectPts = data.filter(p => p.scope === 'project');

      constellationChart = new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [
            {
              label: 'Global',
              data: globalPts.map(p => ({ x: p.age, y: p.strength })),
              backgroundColor: CYAN_DIM,
              borderColor: CYAN,
              borderWidth: 0.5,
              pointRadius: globalPts.map(p => Math.max(2, Math.min(6, 2 + p.access_count))),
              pointHoverRadius: 8,
            },
            {
              label: 'Project',
              data: projectPts.map(p => ({ x: p.age, y: p.strength })),
              backgroundColor: 'rgba(179, 136, 255, 0.3)',
              borderColor: PURPLE,
              borderWidth: 0.5,
              pointRadius: projectPts.map(p => Math.max(2, Math.min(6, 2 + p.access_count))),
              pointHoverRadius: 8,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { boxWidth: 8, padding: 16, usePointStyle: true },
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const pts = ctx.dataset.label === 'Global' ? globalPts : projectPts;
                  const p = pts[ctx.dataIndex];
                  return p ? `${p.content.slice(0, 50)}...` : '';
                },
              },
            },
          },
          scales: {
            x: {
              title: { display: true, text: 'Age (days)', color: '#5c6773' },
              reverse: true,
              grid: { color: 'rgba(0, 229, 255, 0.04)' },
            },
            y: {
              title: { display: true, text: 'Strength', color: '#5c6773' },
              min: 0, max: 1,
              grid: { color: 'rgba(0, 229, 255, 0.04)' },
            },
          },
        },
      });
    }

    // --- Strength Distribution ---
    async function updateStrengthDist() {
      const data = await fetchJson('/api/strength-distribution');
      if (!data) return;

      const ctx = document.getElementById('strengthChart').getContext('2d');
      if (strengthChart) strengthChart.destroy();

      strengthChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.range),
          datasets: [{
            data: data.map(d => d.count),
            backgroundColor: data.map((_, i) => {
              const t = i / data.length;
              if (t < 0.15) return 'rgba(255, 82, 82, 0.6)';
              if (t < 0.4) return 'rgba(255, 215, 64, 0.6)';
              if (t < 0.7) return 'rgba(0, 191, 165, 0.6)';
              return 'rgba(0, 229, 255, 0.6)';
            }),
            borderColor: data.map((_, i) => {
              const t = i / data.length;
              if (t < 0.15) return RED;
              if (t < 0.4) return AMBER;
              if (t < 0.7) return TEAL;
              return CYAN;
            }),
            borderWidth: 1,
            borderRadius: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 45, font: { size: 8 } },
            },
            y: {
              grid: { color: 'rgba(0, 229, 255, 0.04)' },
            },
          },
        },
      });
    }

    // --- Event Feed ---
    async function updateEvents() {
      const data = await fetchJson('/api/events?limit=50');
      if (!data || data.length === 0) return;

      const feed = document.getElementById('eventFeed');
      feed.innerHTML = data.map(e => {
        const typeClass = e.event.startsWith('session') ? 'session' : e.event;
        let detail = '';
        if (e.event === 'extract') {
          detail = e.content_snippet || `${e.count ?? 0} memories`;
        } else if (e.event === 'recall') {
          detail = `"${e.query}" → ${e.count} results`;
        } else if (e.event === 'store') {
          detail = e.content_snippet || 'stored';
        } else if (e.event === 'reinforce') {
          detail = `${e.content_snippet || e.memory_id} → ${e.strength}`;
        } else if (e.event === 'forget') {
          detail = e.content_snippet || e.memory_id;
        } else if (e.event === 'consolidate') {
          detail = `${e.merges} merges, ${e.prunes} prunes, ${e.generalizations} patterns`;
        } else if (e.event === 'dedup') {
          detail = `caught ${e.count} duplicate${e.count !== 1 ? 's' : ''}`;
        } else if (e.event === 'session_start') {
          detail = `${e.count} memories loaded`;
        } else if (e.event === 'session_end') {
          detail = 'session ended';
        } else {
          detail = e.event;
        }

        return `<div class="event-item">
          <span class="event-type ${typeClass}">${e.event.replace('_', ' ')}</span>
          <span class="event-time">${timeAgo(e.ts)}</span>
          <span class="event-detail">${detail}</span>
          <span class="event-project">${e.project || ''}</span>
        </div>`;
      }).join('');
    }

    // --- Tags ---
    async function updateTags() {
      const data = await fetchJson('/api/tags');
      if (!data) return;

      const list = document.getElementById('tagList');
      list.innerHTML = data.slice(0, 20).map(t =>
        `<span class="tag-pill">${t.tag}<span class="count">${t.count}</span></span>`
      ).join('');
    }

    // --- Init ---
    async function refresh() {
      await Promise.all([
        updateHealth(),
        updateRadar(),
        updateConstellation(),
        updateStrengthDist(),
        updateEvents(),
        updateTags(),
      ]);
    }

    refresh();
    setInterval(refresh, 30000); // Refresh every 30s
  </script>
</body>
</html>
